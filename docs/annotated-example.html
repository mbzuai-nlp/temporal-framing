      <h1 class="anno-page-title">Annotated Example</h1>
      <p class="anno-intro">A full annotated article illustrating temporal framing at the sentence level. Frame labels follow each annotated sentence.</p>
      <figure class="anno-figure">
          <div class="annotated-example" role="article" aria-label="Annotated article with temporal frame labels">
          <h3 class="anno-subhead">Violence Has Been Normalized</h3>
          <p class="anno-p">During the misnamed and mostly preposterous debate between Kamala Harris and Donald Trump, a moderator fact-checked Trump’s claim that crime is up.</p>
          <p class="anno-p">In contrast to Trump’s claim, moderator David Muir said that the FBI reports that crime is down, a claim that likely struck every viewer as obviously wrong.</p>
          <div class="anno-row">
            <p class="anno-text">Shoplifting was not a way of life before lockdowns.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span><span class="anno-chip anno-chip--anchoring">Temporal Anchoring</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Most cities were not demographic minefields of danger around every corner.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">There was no such thing as a drugstore with nearly all products behind locked Plexiglas.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">We weren’t warned of spots in cities, even medium-sized ones, where carjacking was a real risk.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">It is wildly obvious that high crime in the U.S. is endemic, with ever less respect for person and property.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--primacy">Primacy</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">As for the FBI’s statistics, they’re worth about as much as most data coming from federal agencies these days.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <p class="anno-p">They’re there for purposes of propaganda, manipulated to present the most favorable picture possible to help the regime.</p>
          <p class="anno-p">Lies, Damn Lies and Government Statistics.</p>
          <div class="anno-row">
            <p class="anno-text">This is certainly true of the Bureau of Labor Statistics and the Commerce Department, which have been shoveling out obvious nonsense for years.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <p class="anno-p">Professionals in the field know it but go along for reasons of professional survival.</p>
          <div class="anno-row">
            <p class="anno-text">In truth, we’ve never had a real economic recovery since lockdowns.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--anchoring">Temporal Anchoring</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Crime is up.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Literacy is down.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Trust has collapsed.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Societies were shattered and remain so.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Only a few weeks following the officious fact-check at the debate, we now have new data from the National Crime Victimization Survey.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--recency">Recency</span></div>
          </div>
          <blockquote class="anno-quote">The Wall Street Journal reports: “The urban violent-crime rate increased 40% from 2019–2023. Excluding simple assault, the urban violent-crime rate rose 54% over that span. From 2022–2023, the urban violent-crime rate didn’t change to a statistically significant degree, so these higher crime rates appear to be the new norm in America’s cities.”</blockquote>
          <p class="anno-p">But the FBI tries to tell you that crime is down. Sure, whatever they say.</p>
          <div class="anno-row">
            <p class="anno-text">The report isolates the “post-George Floyd protests” because no media source wants to mention the lockdowns.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--anchoring">Temporal Anchoring</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">It is still a taboo subject.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <p class="anno-p">We somehow cannot say, even now, that the worst abuses of rights in U.S. history in terms of scale and depth were a disaster, simply because saying so implicates the whole of the media, both parties, all government agencies, academia and all the upper reaches of the social and political order.</p>
          <h3 class="anno-subhead">Politics Has Become Life and Death</h3>
          <div class="anno-row">
            <p class="anno-text">The problem of political division is getting alarmingly serious.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--urgency">Urgency</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">It’s no longer just about competing yard signs and loud rallies.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">We now have regular assassination attempts, plus even an extremely strange appearance of a bounty put on a candidate’s head by an official agency.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Surveys have shown that 26 million people in the U.S. believe that violence is fine to keep Trump from regaining the presidency.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <p class="anno-p">Where might people have gotten that idea?</p>
          <p class="anno-p">Probably from many Hollywood movies that fantasize about having killed Hitler before he accomplished his evil plus the nonstop likening of Trump to Hitler, and hence one follows from another. Liken Trump to Hitler and that is the result you produce.</p>
          <p class="anno-p">There’s private violence, public violence and many forms in between including vigilante violence.</p>
          <div class="anno-row">
            <p class="anno-text">Rights violations against person and property are now normalized.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">This springs from the culture of our times which has been heavily informed and even defined by the deployment of state violence in service of policy goals, at a scale, scope and depth never before seen.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--primacy">Primacy</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <h3 class="anno-subhead">The Role of Censorship</h3>
          <p class="anno-p">Censorship is a major part of it.</p>
          <p class="anno-p">Censorship is the deployment of force in service of state power, and other institutions connected to state power, for purposes of culture planning.</p>
          <p class="anno-p">It’s exercised by the shallow state, in response to the middle state, and on behalf of the deep state.</p>
          <p class="anno-p">It’s a form of violence that interrupts the free flow of information: the ability to speak, and the ability to learn.</p>
          <p class="anno-p">Censorship trains the population to be quiet, afraid and constantly stressed, and it sorts people by the compliant versus the dissidents.</p>
          <p class="anno-p">Censorship is designed to shape the public mind toward the end of shoring up regime stability.</p>
          <div class="anno-row">
            <p class="anno-text">Once it starts, there’s no limit to it.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">I’ve mentioned to people that Substack, Rumble and X could be banned by the spring of next year, and people respond with incredulity.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--skeptical">Skeptical</span></div>
          </div>
          <p class="anno-p">Why?</p>
          <div class="anno-row">
            <p class="anno-text">Four years ago, we were locked in our homes and locked out of churches, and the schools for which people pay all year were shut down by government force.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--anchoring">Temporal Anchoring</span></div>
          </div>
          <p class="anno-p">If they can do that, they can do anything.</p>
          <div class="anno-subhead-row">
            <h3 class="anno-subhead">Remember Free Speech?</h3>
            <div class="anno-labels anno-labels--inline" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Censorship has been so effective that it’s changed the way we engage with each other even in private.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <p class="anno-p">Brownstone Institute, which I founded, recently held a private retreat for scholars, fellows and special guests. One very special guest wrote me that she was completely shocked at the freedom of thought and speech that was present in the room. As a mover in the highest circles, she had forgotten what that was like.</p>
          <div class="anno-row">
            <p class="anno-text">This censorship coincides with a strange valorization of violence that we are presented with from all over the world: Ukraine, the Middle East, London, Paris and many American cities. Never have so many held video cameras in their pockets and never have there been so many platforms on which to post the results.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--primacy">Primacy</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">One does wonder how all these relentless presentations of destruction and killing affect public culture.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <h3 class="anno-subhead">Why They’re Doing It</h3>
          <p class="anno-p">What purpose are all these soft, hard, public and private exercises of violence serving?</p>
          <div class="anno-row">
            <p class="anno-text">The standard of living is suffering, lives are shortening, despair and ill health are main features of the population and illiteracy has swept through an entire generation.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span></div>
          </div>
          <p class="anno-p">The decision to deploy violence to master the microbial kingdom did not turn out well. Worse, it unleashed violence as a way of life.</p>
          <blockquote class="anno-quote">“When plunder becomes a way of life for a group of men in a society,” wrote Frederic Bastiat, “over the course of time they create for themselves a legal system that authorizes it and a moral code that glorifies it.”</blockquote>
          <p class="anno-p">That is precisely where we are.</p>
          <div class="anno-row">
            <p class="anno-text">It’s time we talk about it and name the culprit.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--urgency">Urgency</span></div>
          </div>
          <div class="anno-row">
            <p class="anno-text">Liberty, privacy and property were already unsafe before 2020 but it was the lockdowns that unleashed Pandora’s box of evils.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--continuity">Continuity</span><span class="anno-chip anno-chip--anchoring">Temporal Anchoring</span><span class="anno-chip anno-chip--contrast">Temporal Contrast</span></div>
          </div>
          <p class="anno-p">We cannot live this way.</p>
          <div class="anno-row">
            <p class="anno-text">The only arguments worth having are those that name the reason for the suffering and offer a viable path back to civilized living.</p>
            <div class="anno-labels" aria-label="Frame labels"><span class="anno-chip anno-chip--nostalgia">Nostalgia</span></div>
          </div>
          </div>
